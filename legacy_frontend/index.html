<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Industrial - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --light: #f8fafc;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light);
            color: var(--dark);
            margin: 0;
            display: flex;
            height: 100vh;
        }
        aside {
            width: 260px;
            background: var(--dark);
            color: white;
            padding: 2rem;
        }
        main {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body>
    <aside>
        <h2>CRM INDELPA</h2>
        <nav>
            <ul>
                <li>Usuarios</li>
                <li>Empresas</li>
                <li>Configuración</li>
            </ul>
        </nav>
    </aside>
    <main>
        <div class="header">
            <h1>Panel de Control</h1>
            <button style="background: var(--primary); color: white; border: none; padding: 0.5rem 1rem; border-radius: 6px;">Nuevo Registro</button>
        </div>
        <div class="card">
            <h3>Estado del Sistema</h3>
            <p>Backend conectado: <strong>SQL/Python activo</strong></p>
        </div>
    </main>
    <script src="js/app.js"></script>
</body>
</html>
